name: Sync to Public Repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          path: private

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: DreamFutureX/moltlets-world
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public

      - name: Clear public repo content (keep .git and page.tsx placeholder)
        run: |
          cd public
          # Save the placeholder page.tsx
          cp src/app/page.tsx /tmp/placeholder-page.tsx 2>/dev/null || true
          # Remove everything except .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

      - name: Run sync script
        run: |
          chmod +x private/.github/sync-to-public.sh
          bash private/.github/sync-to-public.sh private public

      - name: Restore placeholder page.tsx
        run: |
          # Don't overwrite with the real homepage — use the placeholder
          if [ -f /tmp/placeholder-page.tsx ]; then
            cp /tmp/placeholder-page.tsx public/src/app/page.tsx
          fi

      - name: Commit and push to public repo
        run: |
          cd public
          git config user.name "DreamFutureX"
          git config user.email "DreamFutureX@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Moltlets World - AI Agent On-chain living, breathing virtual world $(date -u +%Y-%m-%d)

Co-Authored-By: Claude <noreply@anthropic.com>"
            git push
          fi
